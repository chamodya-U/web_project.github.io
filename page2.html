<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="background-pg"></div>
    <div class="log">
      <div class="login-block">
      <h1 class="login">Welcome Back</h1>
        <div>
          <form class="login-form" action="page2.html" method="post">
            <label class="form-label" for="email">Email*</label>
            <input class="form-input" id="email" type="text" name="email" placeholder="  Email Address" required />
            <label class="form-label" for="password">Password*</label>
            <input class="form-input" id="password" type="password" name="password" placeholder="  Password" required />
            <div class="forgot-password">
              <div class="remember" ><input type="checkbox"><p>Remember me</p></div>
              <div class="frogott"><a href="forgot-password.html">Forgot password?</a></div>                         
            </div>            
            <button class="login-submit" type="submit">Log in</button>            
            <p class="signup-link">Don't have an account? <a href="register.html"><b>Register</b></a></p>
            <button type="submit" onclick="window.location.href='index.html'">Guest</button>  
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
