<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="background-pg"></div>
    <div class="log">
      <div class="login-block">
      <h1 class="login">Welcome Back</h1>
        <div>
          <form class="login-form" action="page2.html" method="post">
            <label class="form-label" for="username">Username*</label>
            <input class="form-input" type="text" name="username" placeholder="Username" required />
            <label class="form-label" for="password">Password*</label>
            <input class="form-input" type="password" name="password" placeholder="Password" required />
            <button class="login-submit" type="submit">Log in</button>
            <a class="forgot-password" href="forgot-password.html">Forgot your password?</a>

            <p class="signup-link">Don't have an account? <a href="register.html">Register here</a></p>          </form>
        </div>
      </div>
    </div>
  </body>
</html>
