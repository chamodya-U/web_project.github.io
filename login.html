<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="background-pg"></div>
    <div class="container">
      <div class="log" id="log">
        <div class="login-block">
          <h1 class="login">Welcome Back</h1>
          <div>
            <form
              class="login-form"
              id="login-form"
              action="index.html"
              method="post"
            >
              <label class="form-label" for="email">Email*</label>
              <input
                class="form-input"
                id="email"
                type="text"
                name="email"
                placeholder="Email Address - admin@gmail.com"
              />
              <span id="email-error" class="error-msg"></span>
              <label class="form-label" for="password" id="log-pass"
                >Password*</label
              >
              <input
                class="form-input"
                id="password"
                type="password"
                name="password"
                placeholder="Password - Admin123#"
              />
              <span id="password-error" class="error-msg"></span>
              <div class="forgot-password">
                <div class="remember">
                  <input type="checkbox" />
                  <p>Remember me</p>
                </div>
                <div class="frogott">
                  <a href="forgot-password.html">Forgot password?</a>
                </div>
              </div>
              <button class="login-submit" type="submit">Log in</button>
              <p class="signup-link">
                Don't have an account?
                <a
                  href="#"
                  id="register-link"
                  onclick="
                    register();
                    return false;
                  "
                  ><b>Register</b></a
                >
              </p>
              <button
                type="submit"
                onclick="window.location.href = 'index.html'"
              >
                Guest
              </button>
            </form>
          </div>
        </div>
      </div>

      <div class="register" id="register">
        <div class="register-block">
          <h1 class="regist">Register</h1>
          <div>
            <form class="register-form" id="register-form" method="post">
              <div class="name">
                <div class="fname">
                  <label class="form-label" for="fname">First Name*</label>
                  <input
                    class="form-input"
                    id="fname"
                    type="text"
                    name="fname"
                    placeholder="Tasan"
                    required
                  />
                  <!--fname error messege-->
                  <span id="fname-error"></span>
                </div>
                <div class="lname">
                  <label class="form-label" for="lname">Last Name*</label>
                  <input
                    class="form-input"
                    id="lname"
                    type="text"
                    name="lname"
                    placeholder="Ranawana"
                    required
                  />
                  <!-- lname error messege-->
                  <span id="lname-error"></span>
                </div>
              </div>
              <div class="ed">
                <label class="form-label" for="email">Email*</label>
                <input
                  class="form-input"
                  id="email"
                  type="email"
                  name="email"
                  placeholder="Email Address"
                  required
                />
                <!-- email error messege-->
                <span id="regemail-error"></span>
              </div>
              <div class="reg-pass">
                <div class="new-pass">
                  <label class="form-label" for="password">Password*</label>
                  <input
                    class="form-input"
                    id="password"
                    type="password"
                    name="password"
                    placeholder="Enter a Password"
                    required
                    minlength="8"
                  />
                  <!-- password error messege-->
                  <span id="regPass-error"></span>
                </div>
                <div class="confirm-pass">
                  <label class="form-label" for="confirm-pass"
                    >Confirm Password*</label
                  >
                  <input
                    class="form-input"
                    id="confirm-pass"
                    type="password"
                    name="confirm-pass"
                    placeholder="Re Enter the Password"
                    required
                    minlength="8"
                  />
                  <!--password confirm error messege-->
                  <span id="regConfirmPass-error"></span>
                </div>
              </div>
              <div class="ed">
                <label class="form-label" for="dep">Department</label>
                <input
                  class="form-input"
                  id="dep"
                  type="text"
                  name="dep"
                  placeholder="Computer System Engineering"
                  required
                />
                <!--department error messege-->
                <span id="dep-error"></span>
              </div>
              <div class="intel">
                <div class="ID">
                  <label class="form-label" for="ID_num">Index Number</label>
                  <input
                    class="form-input"
                    id="ID_num"
                    type="text"
                    name="ID_num"
                    placeholder="CS/20XX/XXX"
                    required
                  />
                  <!--Index number error messege-->
                  <span id="id-error"></span>
                </div>
                <div class="tele">
                  <label class="form-label" for="tel">Contact Number</label>
                  <input
                    class="form-input"
                    id="tel"
                    type="tel"
                    name="tel"
                    placeholder="07x-xxxxxxx"
                    pattern="07[0-9]{8}"
                    title="Enter a valid Sri Lankan number"
                    required
                  />
                  <!--contact error messege-->
                  <span id="tel-error"></span>
                </div>
              </div>
              <button class="signup-submit" type="submit">Sign Up</button>
              <p class="login-link">
                Have an Account?
                <a
                  href="#"
                  onclick="
                    log();
                    return false;
                  "
                  ><b>Login</b></a
                >
              </p>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="login.js"></script>
  </body>
</html>
